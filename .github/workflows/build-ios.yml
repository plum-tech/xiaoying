name: Flutter Build iOS

env:
  # 填写可访问 plum-tech/xiaoying-x 以及相关私有依赖仓库的 GitHub Personal Access Token; 用于检出私有仓库和拉取私有依赖。
  MIMIR_GITHUB_TOKEN: ${{ secrets.MIMIR_GITHUB_TOKEN }}
  # 填写 Apple Distribution 证书 .p12 文件的 Base64 编码内容; 用于导入 iOS 发布签名证书。
  P12_BASE64: ${{ secrets.P12_BASE64 }}
  # 填写导出 .p12 证书时设置的密码; 用于解锁并导入签名证书。
  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
  # 填写主 App provisioning profile(.mobileprovision) 的 Base64 编码内容; 用于主 App 的代码签名和授权配置。
  PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
  # 填写 HomeWidget 扩展 provisioning profile(.mobileprovision) 的 Base64 编码内容; 用于 HomeWidget 扩展的代码签名和授权配置。
  PROVISIONING_PROFILE_HOME_WIDGET_BASE64: ${{ secrets.PROVISIONING_PROFILE_HOME_WIDGET_BASE64 }}
  # 填写主 App provisioning profile 的 UUID; 用于 xcodebuild 在归档时选择正确的描述文件。
  PROVISIONING_PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
  # 填写 App Store Connect API Key 的 Issuer ID; 用于认证 TestFlight 上传请求。
  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
  # 填写 App Store Connect API Key 的 Key ID; 用于识别上传 TestFlight 使用的 API Key。
  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
  # 填写 App Store Connect API Key 的 .p8 私钥完整内容; 用于签名并授权 TestFlight 上传。
  APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

on:
  workflow_dispatch:
    inputs:
      deploy_app_store:
        description: 'Deploy on App Store connect'
        required: true
        default: true
        type: boolean
      ref:
        description: 'Branch, tag or commit to build'
        default: ""
        type: string
jobs:
  build_ios:
    # 保持你原始的 macOS 版本设置
    runs-on: macos-26
    steps:
      # 检出代码仓库，使用 PAT 令牌
      - uses: actions/checkout@v6
        with:
          repository: plum-tech/xiaoying-x
          ref: ${{ inputs.ref }}
          token: ${{ env.MIMIR_GITHUB_TOKEN }}

      # 设置 Xcode 版本为 26.2
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      # 下载 iOS 运行环境组件
      - name: Install iOS components
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 20
          shell: bash
          command: xcodebuild -downloadPlatform iOS

      # 配置 Git 全局 URL 替换，确保私有依赖可以通过 PAT 正确拉取
      - name: Configure Git for private dependencies
        run: |
          git config --global url."https://${{ env.MIMIR_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # 导入 P12 证书并设置密码，用于对 App 进行物理签名
      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ env.P12_BASE64 }}
          p12-password: ${{ env.P12_PASSWORD }}

      # 将主 App 的描述文件 Base64 解码并安装到指定系统目录
      - name: Install the provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ env.PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

      # 将 HomeWidget 的描述文件 Base64 解码并安装到指定系统目录
      - name: Install the provisioning profile of HomeWidget
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ env.PROVISIONING_PROFILE_HOME_WIDGET_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/build_home_widget_pp.mobileprovision

      # 设置 Flutter 环境并开启缓存
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version-file: pubspec.yaml

      # 关闭 Flutter CLI 动画（更干净的日志）
      - name: Configure Flutter CLI
        run: |
          flutter config --no-cli-animations

      # 先拉取 Dart 依赖（可重试）
      - name: Flutter pub get
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 20
          shell: bash
          command: flutter pub get

      # 独立执行 pod install（可重试）
      - name: CocoaPods install
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 20
          shell: bash
          command: |
            if [ ! -f ios/Podfile ]; then
              echo "Podfile not found, skipping pod install."
              exit 0
            fi
            cd ios
            COCOAPODS_DISABLE_STATS=true LANG=en_US.UTF-8 pod install --verbose

      # 只生成 iOS 配置（可能会再次触发 pod install），不执行编译
      - name: Prepare iOS project (config only)
        run: |
          flutter build ios --release --no-codesign --no-pub --config-only

      # 在 Xcode 中解析并下载 Swift Package 依赖
      - name: Build resolve Swift dependencies
        run: |
          xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release

      # 生成 xArchive。UUID 已修改为从 Secrets 读取。
      # PROVISIONING_PROFILE 参数决定了构建时使用的具体授权文件。
      - name: Build xArchive
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            DEVELOPMENT_TEAM="TGBYYVM7AB" \
            -sdk 'iphoneos' \
            -destination 'generic/platform=iOS' \
            -archivePath build-output/app.xcarchive \
            PROVISIONING_PROFILE="${{ env.PROVISIONING_PROFILE_UUID }}" \
            clean archive \
            CODE_SIGN_IDENTITY="Apple Distribution: Shanghai Plum Technology Ltd. (TGBYYVM7AB)"

      # 将 Archive 转换为最终可发布的 .ipa 文件
      - name: Export ipa
        run: |
          xcodebuild -exportArchive -archivePath build-output/app.xcarchive -exportPath build-output/ios -exportOptionsPlist ios/ExportOptions.plist

      # 将生成的 .ipa 文件上传为 GitHub Actions 产物
      - name: Publish iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: iOS-release
          path: build-output/ios/life.mysit.SITLife.ipa

  after_build:
    runs-on: macos-latest
    if: ${{ inputs.deploy_app_store }}
    needs: [ build_ios ]
    steps:
      - uses: actions/checkout@v6
        with:
          repository: plum-tech/xiaoying-x
          ref: ${{ inputs.ref }}
          token: ${{ env.MIMIR_GITHUB_TOKEN }}
          fetch-depth: 0

      # 下载 build_ios 阶段生成的安装包
      - name: Get iOS Artifact
        uses: actions/download-artifact@v8
        with:
          name: iOS-release
          path: build/

      # 上传至 TestFlight。注意这里使用的 API Key 和 Private Key 均来自 Secrets。
      - name: Deploy to App Store (TestFlight)
        uses: apple-actions/upload-testflight-build@v3.0.0
        with:
          app-path: ${{ github.workspace }}/build/life.mysit.SITLife.ipa
          issuer-id: ${{ env.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ env.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ env.APP_STORE_CONNECT_API_PRIVATE_KEY }}
